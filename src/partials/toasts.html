<div class="flex flex-col gap-4 w-full max-w-md">
  <div class="text-sm font-medium">Toast Notifications</div>
  <div class="toast toast-end">
    <div class="alert alert-info">
      <span>New message arrived.</span>
    </div>
  </div>
  <div class="flex gap-2 flex-wrap">
    <div class="chat chat-end">
      <div class="chat-header opacity-50">
        You
        <time class="text-xs">12:45</time>
      </div>
      <div class="chat-bubble chat-bubble-primary">Hey! How are you?</div>
    </div>
    <div class="chat chat-start">
      <div class="chat-header opacity-50">
        Them
        <time class="text-xs">12:46</time>
      </div>
      <div class="chat-bubble">I'm fine, thanks!</div>
    </div>
    <div class="chat chat-end">
      <div class="chat-bubble chat-bubble-primary">Great to hear!</div>
    </div>
  </div>
</div>
