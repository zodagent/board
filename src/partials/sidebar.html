<div
    z-ref="sidebar"
    class="h-full h-screen rounded-xl bg-base-100 border-r border-base-300 flex flex-col overflow-clip transition-all duration-200"
    z-bind:style="sidebarStyle"
>
    <!-- Logo + Toggle -->
    <div
        class="flex items-center justify-between px-3 h-12 border-b border-base-300 shrink-0"
    >
        <!-- Expanded: logo + text + toggle -->
        <div z-show="showContent" class="flex items-center gap-2 flex-1">
            <a
                href="/"
                class="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-base-200 transition-colors"
            >
                <i data-lucide="grid-2x2" class="w-5 h-5 text-primary shrink-0"></i>
                <span
                    class="text-sm font-bold text-base-content whitespace-nowrap"
                    >Board</span
                >
            </a>
            <div class="flex-1"></div>
            <button
                class="btn btn-ghost btn-xs btn-square rounded-lg shrink-0 focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
                aria-label="Collapse sidebar"
                z-on:click="toggleCollapse"
            >
                <i data-lucide="panel-left-close" class="w-4 h-4"></i>
            </button>
        </div>
        <!-- Collapsed: logo, hover shows expand -->
        <div z-show="isCollapsed" class="flex justify-center w-full group/header relative">
            <a
                href="/"
                class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-base-200 transition-colors group-hover/header:opacity-0 group-hover/header:pointer-events-none"
            >
                <i data-lucide="grid-2x2" class="w-5 h-5 text-primary shrink-0"></i>
            </a>
            <button
                class="absolute inset-0 flex items-center justify-center w-10 h-10 mx-auto rounded-xl hover:bg-base-200 transition-colors opacity-0 pointer-events-none group-hover/header:opacity-100 group-hover/header:pointer-events-auto focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
                aria-label="Expand sidebar"
                z-on:click="toggleCollapse"
            >
                <i data-lucide="panel-left-open" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Nav Sections: Expanded -->
    <div z-show="showContent" class="flex-1 min-h-0 overflow-y-auto">
    <div
        z-each="sections"
        class="pt-3 pb-1 space-y-1"
    >
        <div class="px-3">
            <details class="group/section">
                <summary
                    class="flex items-center gap-2.5 w-full h-10 px-3 rounded-xl hover:bg-base-200 transition-colors text-left cursor-pointer list-none [&::-webkit-details-marker]:hidden group/row focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
                    data-nav-item
                    z-bind:data-label="label"
                >
                    <div
                        class="relative w-6 h-6 shrink-0 flex items-center justify-center"
                    >
                        <i
                            z-bind:data-lucide="icon"
                            class="w-4 h-4 absolute text-base-content/60 transition-opacity duration-150 group-hover/row:opacity-0"
                        ></i>
                        <i data-lucide="chevron-right" class="w-3 h-3 absolute text-base-content/60 opacity-0 group-hover/row:opacity-100 transition-all duration-150 group-open/section:rotate-90"></i>
                    </div>
                    <span
                        z-text="label"
                        class="text-sm text-base-content/60 group-hover/row:text-base-content flex-1"
                    ></span>
                    <kbd
                        z-text="shortcut"
                        class="opacity-0 group-hover/row:opacity-100 transition-opacity text-[10px] text-base-content/30 font-mono"
                    ></kbd>
                </summary>
                <div z-each="children" class="ml-4 mt-0.5 space-y-0.5 pb-1">
                    <a
                        class="flex items-center gap-2 h-8 px-3 rounded-lg text-sm text-base-content/60 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer"
                        z-bind:data-label="label"
                        data-nav-item
                    >
                        <span z-bind:class="dotClass"></span>
                        <span z-text="label"></span>
                    </a>
                </div>
            </details>
        </div>
    </div>
    </div>

    <!-- Nav Sections: Collapsed -->
    <div z-show="isCollapsed" class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden">
    <div
        z-each="sections"
        class="pt-3 pb-1 space-y-1"
    >
        <div class="flex justify-center px-0 mb-2">
            <button
                class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-base-200 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
                z-bind:title="label"
                z-bind:aria-label="label"
                z-bind:popovertarget="pop"
                tabindex="0"
                data-nav-item
                z-bind:data-label="label"
            >
                <div class="relative w-6 h-6 shrink-0 flex items-center justify-center">
                    <i z-bind:data-lucide="icon" class="w-4 h-4 text-base-content/60"></i>
                </div>
            </button>
            <ul
                class="dropdown menu w-52 rounded-box bg-base-100 shadow-sm border border-base-300"
                popover
                z-bind:id="pop"
            >
                <li class="menu-title" z-text="label"></li>
                <div z-each="children">
                    <li>
                        <a z-bind:data-label="label" data-nav-item class="flex items-center gap-2">
                            <span z-bind:class="dotClass"></span>
                            <span z-text="label"></span>
                        </a>
                    </li>
                </div>
            </ul>
        </div>
    </div>
    </div>

    <!-- Bottom -->
    <div class="shrink-0 border-t border-base-300 px-3 py-3">
        <!-- Expanded: upgrade -->
        <div z-show="showContent" class="flex justify-center mb-3">
            <button
                class="btn btn-xs btn-outline btn-primary rounded-full gap-1 text-xs"
            >
                <i
                    data-lucide="arrow-up"
                    class="w-3 h-3"
                ></i>
                Upgrade plan
            </button>
        </div>
        <!-- Collapsed: upgrade icon -->
        <div z-show="isCollapsed" class="flex justify-center mb-3">
            <button
                class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-base-200 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2"
                title="Upgrade plan"
                aria-label="Upgrade plan"
            >
                <i
                    data-lucide="arrow-up"
                    class="w-4 h-4 text-primary"
                ></i>
            </button>
        </div>
        <!-- Expanded: user dropdown -->
        <div z-show="showContent" class="dropdown dropdown-top w-full">
            <div tabindex="0" role="button" class="flex items-center gap-2.5 w-full h-10 px-6 rounded-xl hover:bg-base-200 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2 cursor-pointer">
                <div class="relative shrink-0">
                    <div class="w-6 h-6 rounded-full bg-base-content/10 flex items-center justify-center text-[10px] font-bold text-base-content/60">G</div>
                    <span class="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-success border border-base-100"></span>
                </div>
                <span class="text-sm text-base-content/80 truncate">Guest</span>
                <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-base-content/30 ml-auto shrink-0"></i>
            </div>
            <ul tabindex="-1" class="dropdown-content menu bg-base-100 border border-base-300 rounded-xl shadow-lg w-60 p-1 z-50 mb-2">
                <li class="px-3 py-3 border-b border-base-300">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-xs font-bold text-primary">R</div>
                        <div class="min-w-0">
                            <div class="text-sm font-semibold text-base-content truncate">Guest</div>
                            <div class="text-xs text-base-content/50 truncate">Sign in to sync</div>
                        </div>
                    </div>
                </li>
                <div z-each="userMenuItems">
                    <div>
                        <div z-show="divider" class="border-t border-base-300 my-1 mx-3"></div>
                        <a z-show="icon" z-bind:class="cls" class="flex items-center gap-3 h-9 px-3 rounded-lg text-sm transition-colors cursor-pointer">
                            <i z-bind:data-lucide="icon" class="w-4 h-4 shrink-0"></i>
                            <span class="flex-1" z-text="label"></span>
                            <kbd z-show="shortcut" z-text="shortcut" class="text-[10px] text-base-content/30 font-mono"></kbd>
                            <i z-show="chevron" data-lucide="chevron-right" class="w-3.5 h-3.5 shrink-0 text-base-content/30"></i>
                        </a>
                    </div>
                </div>
            </ul>
        </div>
        <!-- Collapsed: user dropdown -->
        <div z-show="isCollapsed" class="dropdown dropdown-top flex justify-center">
            <div tabindex="0" role="button" class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-base-200 transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:outline-offset-2 cursor-pointer">
                <div class="relative shrink-0">
                    <div class="w-6 h-6 rounded-full bg-base-content/10 flex items-center justify-center text-[10px] font-bold text-base-content/60">G</div>
                    <span class="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-success border border-base-100"></span>
                </div>
            </div>
            <ul tabindex="-1" class="dropdown-content menu bg-base-100 border border-base-300 rounded-xl shadow-lg w-60 p-1 z-50 mb-2 left-0">
                <li class="px-3 py-3 border-b border-base-300">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-xs font-bold text-primary">R</div>
                        <div class="min-w-0">
                            <div class="text-sm font-semibold text-base-content truncate">Guest</div>
                            <div class="text-xs text-base-content/50 truncate">Sign in to sync</div>
                        </div>
                    </div>
                </li>
                <div z-each="userMenuItems">
                    <div>
                        <div z-show="divider" class="border-t border-base-300 my-1 mx-3"></div>
                        <a z-show="icon" z-bind:class="cls" class="flex items-center gap-3 h-9 px-3 rounded-lg text-sm transition-colors cursor-pointer">
                            <i z-bind:data-lucide="icon" class="w-4 h-4 shrink-0"></i>
                            <span class="flex-1" z-text="label"></span>
                            <kbd z-show="shortcut" z-text="shortcut" class="text-[10px] text-base-content/30 font-mono"></kbd>
                            <i z-show="chevron" data-lucide="chevron-right" class="w-3.5 h-3.5 shrink-0 text-base-content/30"></i>
                        </a>
                    </div>
                </div>
            </ul>
        </div>
    </div>
</div>

<script>
    var root = Zinc.refs.sidebar;
    var log = zlog.create("sidebar");

    var store = ztore({
        isCollapsed: false,
        showContent: true,
        sidebarStyle: "width:200px;overflow-clip-margin:250px",
        activeItem: "",
        sections: [
            {
                id: "new",
                pop: "pop-new",
                icon: "plus",
                label: "New",
                shortcut: "\u2303\u2325N",
                children: [
                    { label: "Document", dotClass: "w-1.5 h-1.5 rounded-full bg-primary" },
                    { label: "Spreadsheet", dotClass: "w-1.5 h-1.5 rounded-full bg-secondary" },
                    { label: "Presentation", dotClass: "w-1.5 h-1.5 rounded-full bg-accent" },
                    { label: "Board", dotClass: "w-1.5 h-1.5 rounded-full bg-info" },
                ],
            },
            {
                id: "spaces",
                pop: "pop-spaces",
                icon: "folder",
                label: "Spaces",
                shortcut: "\u2303\u23251",
                children: [
                    { label: "My Space", dotClass: "w-1.5 h-1.5 rounded-full bg-success" },
                    { label: "Shared", dotClass: "w-1.5 h-1.5 rounded-full bg-info" },
                    { label: "Archive", dotClass: "w-1.5 h-1.5 rounded-full bg-warning" },
                ],
            },
            {
                id: "computer",
                pop: "pop-computer",
                icon: "monitor",
                label: "Computer",
                shortcut: "\u2303\u23252",
                children: [
                    { label: "Desktop", dotClass: "w-1.5 h-1.5 rounded-full bg-primary" },
                    { label: "Documents", dotClass: "w-1.5 h-1.5 rounded-full bg-primary" },
                    { label: "Downloads", dotClass: "w-1.5 h-1.5 rounded-full bg-primary" },
                ],
            },
            {
                id: "artifacts",
                pop: "pop-artifacts",
                icon: "layout-grid",
                label: "Artifacts",
                shortcut: "\u2303\u23253",
                children: [
                    { label: "All", dotClass: "w-1.5 h-1.5 rounded-full bg-secondary" },
                    { label: "Recent", dotClass: "w-1.5 h-1.5 rounded-full bg-secondary" },
                ],
            },
            {
                id: "customize",
                pop: "pop-customize",
                icon: "settings",
                label: "Customize",
                shortcut: "\u2303\u23254",
                children: [
                    { label: "Themes", dotClass: "w-1.5 h-1.5 rounded-full bg-accent" },
                    { label: "Layout", dotClass: "w-1.5 h-1.5 rounded-full bg-accent" },
                    { label: "Shortcuts", dotClass: "w-1.5 h-1.5 rounded-full bg-accent" },
                ],
            },
            {
                id: "history",
                pop: "pop-history",
                icon: "clock",
                label: "History",
                shortcut: "\u2303\u23255",
                children: [
                    { label: "Today", dotClass: "w-1.5 h-1.5 rounded-full bg-base-content/30" },
                    { label: "This Week", dotClass: "w-1.5 h-1.5 rounded-full bg-base-content/30" },
                    { label: "Older", dotClass: "w-1.5 h-1.5 rounded-full bg-base-content/30" },
                ],
            },
        ],
        userMenuItems: [
            { icon: "settings", label: "All settings", shortcut: "\u2303\u2325S", cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { icon: "circle-arrow-up", label: "Upgrade plan", cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { divider: true },
            { icon: "download", label: "Install apps", cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { divider: true },
            { icon: "moon", label: "Appearance", chevron: true, cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { icon: "languages", label: "Language", chevron: true, cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { icon: "help-circle", label: "Help", chevron: true, cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors cursor-pointer" },
            { divider: true },
            { icon: "log-out", label: "Sign out", cls: "flex items-center gap-3 h-9 px-3 rounded-lg text-sm text-error hover:bg-error/10 transition-colors cursor-pointer" },
        ],
    });

    /* --- Bridge: ztore → Zinc --- */
    function sync(key) { Zinc.set(key, store.get(key)); }

    setTimeout(function () {
        sync("isCollapsed");
        sync("showContent");
        sync("sidebarStyle");
        sync("sections");
        sync("userMenuItems");
        lucide.createIcons();

        log.info("sidebar initialized");
        log.info("nav sections loaded", store.get("sections").map(function(s) {
            return { label: s.label, shortcut: s.shortcut };
        }));
        log.info("user menu items loaded", store.get("userMenuItems").map(function(m) {
            return { label: m.label, shortcut: m.shortcut || null };
        }));
    }, 0);

    store.watch("isCollapsed", function (v) {
        log.debug("isCollapsed changed", { value: v });
        Zinc.set("isCollapsed", v);
        store.set("showContent", !v);
        store.set("sidebarStyle", "width:" + (v ? "4rem" : "200px") + ";overflow-clip-margin:250px");
        setTimeout(lucide.createIcons, 0);
    });

    store.watch("showContent", function (v) { Zinc.set("showContent", v); });
    store.watch("sections", function (v) { Zinc.set("sections", v); });
    store.watch("userMenuItems", function (v) { Zinc.set("userMenuItems", v); });
    store.watch("sidebarStyle", function (v) { Zinc.set("sidebarStyle", v); });

    /* --- Toggle --- */
    window.toggleCollapse = function () {
        store.set("isCollapsed", !store.get("isCollapsed"));
    };

    /* --- Active item (reactive) --- */
    store.watch("activeItem", function (active) {
        log.debug("activeItem changed", { value: active });
        root.querySelectorAll("[data-nav-item]").forEach(function (el) {
            el.classList.remove("bg-primary/10", "text-primary", "font-medium");
            var icon = el.querySelector("i");
            if (icon) {
                icon.classList.remove("text-primary");
                icon.classList.add("text-base-content/60");
            }
        });
        if (!active) return;
        root.querySelectorAll('[data-nav-item][data-label="' + active + '"]').forEach(function (el) {
            el.classList.add("bg-primary/10", "text-primary", "font-medium");
            var icon = el.querySelector("i");
            if (icon) {
                icon.classList.remove("text-base-content/60");
                icon.classList.add("text-primary");
            }
        });
    });

    root.addEventListener("click", function (e) {
        var item = e.target.closest("[data-nav-item]");
        if (!item) return;
        var label = item.getAttribute("data-label");
        if (!label) return;
        store.set("activeItem", label);
    });

    /* --- Keyboard shortcuts --- */
    var shortcuts = {
        "ctrl+alt+n": "New",
        "ctrl+alt+1": "Spaces",
        "ctrl+alt+2": "Computer",
        "ctrl+alt+3": "Artifacts",
        "ctrl+alt+4": "Customize",
        "ctrl+alt+5": "History",
    };

    log.info("shortcuts registered", shortcuts);

    document.addEventListener("keydown", function (e) {
        var parts = [];
        if (e.ctrlKey || e.metaKey) parts.push("ctrl");
        if (e.altKey) parts.push("alt");
        if (e.shiftKey) parts.push("shift");
        var key = e.key.toLowerCase();
        if (!["shift", "control", "meta", "alt"].includes(key)) parts.push(key);
        var combo = parts.join("+");

        if (combo === "ctrl+alt+s") {
            e.preventDefault();
            log.info("shortcut triggered", { combo: combo, action: "open settings" });
            var trigger = root.querySelector(".dropdown-top [tabindex='0']");
            if (trigger) trigger.focus();
            return;
        }

        if (shortcuts[combo]) {
            e.preventDefault();
            var label = shortcuts[combo];
            log.info("shortcut triggered", { combo: combo, label: label });
            store.set("activeItem", label);

            var section = store.get("sections").find(function (s) { return s.label === label; });
            if (section) {
                if (store.get("isCollapsed")) store.set("isCollapsed", false);
                var details = root.querySelector('details[data-label="' + label + '"]');
                if (details && !details.open) details.open = true;
            }
        }
    });
</script>
